<!doctype html>
<html lang="en">
<head>
<script>document.documentElement.className+=' js';</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Studio — the research workstation · The Ruler and the Remainder</title>
<meta name="description" content="The agentic research workstation. Argue with the dramaturg, keep what's worth keeping as artifacts, and grow a living archive of research.">
<link rel="canonical" href="https://ruler-and-remainder.vercel.app/studio.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Ruler and the Remainder">
<meta property="og:title" content="The Studio — the research workstation">
<meta property="og:description" content="Argue with the dramaturg, keep what's worth keeping, grow a living archive of research.">
<meta property="og:url" content="https://ruler-and-remainder.vercel.app/studio.html">
<meta property="og:image" content="https://ruler-and-remainder.vercel.app/og.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#e2300c">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
/* The Studio — self-contained layout so the shared styles.css stays untouched.
   Reuses the corpus palette + fonts; the workstation chrome lives only here. */
:root{ --ink:#0e0d0a; --paper:#f4f0e6; --verm:#e2300c; --muted:#6c6557; --line:#cfc7b1; }
body.studio{ margin:0; background:var(--paper); color:var(--ink);
  font-family:"Newsreader",Georgia,serif; }
.studio-top{ display:flex; align-items:baseline; gap:1rem; flex-wrap:wrap;
  border-bottom:2px solid var(--ink); padding:1rem 1.4rem; }
.studio-top .brand{ font-family:"Space Grotesk",sans-serif; font-weight:700;
  font-size:1.15rem; letter-spacing:-0.01em; text-decoration:none; color:var(--ink); }
.studio-top .brand small{ display:block; font-family:"Space Mono",monospace;
  font-weight:400; font-size:0.66rem; letter-spacing:0.06em; color:var(--muted);
  text-transform:uppercase; }
.studio-top .links{ margin-left:auto; font-family:"Space Mono",monospace;
  font-size:0.72rem; letter-spacing:0.04em; }
.studio-top .links a{ color:var(--verm); text-decoration:none; margin-left:1.1rem; }

.studio-grid{ display:grid; grid-template-columns: 1fr 320px; gap:0;
  height:calc(100vh - 64px); }
@media (max-width:860px){ .studio-grid{ grid-template-columns:1fr; height:auto; } }

/* conversation center */
.center{ display:flex; flex-direction:column; min-width:0; border-right:1px solid var(--line); }
.center-head{ padding:0.8rem 1.4rem; border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:0.7rem; }
.center-head input{ flex:1; min-width:0; font-family:"Space Grotesk",sans-serif;
  font-size:0.95rem; font-weight:600; border:none; background:transparent; color:var(--ink); }
.center-head input:focus{ outline:1px dashed var(--line); }
.btn{ font-family:"Space Mono",monospace; font-size:0.7rem; letter-spacing:0.04em;
  text-transform:uppercase; border:1.5px solid var(--ink); background:var(--paper);
  color:var(--ink); padding:0.35rem 0.7rem; cursor:pointer; border-radius:0; }
.btn:hover{ background:var(--ink); color:var(--paper); }
.btn.verm{ border-color:var(--verm); color:var(--verm); }
.btn.verm:hover{ background:var(--verm); color:var(--paper); }
.btn:disabled{ opacity:0.4; cursor:default; }

.thread{ flex:1; overflow-y:auto; padding:1.4rem; }
.msg{ margin:0 0 1.5rem; max-width:62ch; }
.msg .who{ font-family:"Space Mono",monospace; font-size:0.64rem; letter-spacing:0.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:0.3rem; }
.msg.user .who{ color:var(--ink); }
.msg.dram .who{ color:var(--verm); }
.msg .body{ white-space:pre-wrap; line-height:1.55; font-size:1.02rem; }
.msg .meta{ font-family:"Space Mono",monospace; font-size:0.62rem; color:var(--muted);
  margin-top:0.4rem; }
.msg .keep{ margin-top:0.5rem; }
.msg.pending .body{ color:var(--muted); font-style:italic; }

.composer{ border-top:1px solid var(--line); padding:0.9rem 1.4rem; display:flex; gap:0.7rem; }
.composer textarea{ flex:1; resize:none; font-family:"Newsreader",serif; font-size:1rem;
  line-height:1.5; border:1.5px solid var(--line); padding:0.6rem 0.7rem; background:#fff;
  color:var(--ink); min-height:2.6rem; max-height:9rem; }
.composer textarea:focus{ outline:none; border-color:var(--verm); }

/* the rail */
.rail{ overflow-y:auto; padding:1.1rem 1.2rem; background:#efe9da; }
.rail h2{ font-family:"Space Mono",monospace; font-size:0.66rem; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--muted); margin:1.2rem 0 0.5rem; }
.rail h2:first-child{ margin-top:0; }
.rail .empty{ font-size:0.85rem; color:var(--muted); font-style:italic; }
.card{ background:var(--paper); border:1px solid var(--line); padding:0.6rem 0.7rem;
  margin-bottom:0.5rem; cursor:pointer; }
.card:hover{ border-color:var(--verm); }
.card .t{ font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:0.86rem;
  line-height:1.2; }
.card .s{ font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.04em;
  text-transform:uppercase; color:var(--muted); margin-top:0.25rem; }
.tier{ display:inline-block; font-family:"Space Mono",monospace; font-size:0.56rem;
  letter-spacing:0.04em; text-transform:uppercase; padding:0.05rem 0.35rem; border:1px solid; }
.tier.established{ color:#2c6e49; border-color:#2c6e49; }
.tier.exploratory{ color:#b06a00; border-color:#b06a00; }
.tier.speculative{ color:var(--muted); border-color:var(--muted); }

/* keep-this form (propose-only: the user commits) */
.keepform{ border:1.5px dashed var(--verm); padding:0.7rem; margin-top:0.5rem;
  background:#fff; max-width:62ch; }
.keepform label{ display:block; font-family:"Space Mono",monospace; font-size:0.6rem;
  letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin:0.5rem 0 0.2rem; }
.keepform input, .keepform select, .keepform textarea{ width:100%; box-sizing:border-box;
  font-family:"Newsreader",serif; font-size:0.92rem; border:1px solid var(--line);
  padding:0.4rem 0.5rem; background:var(--paper); color:var(--ink); }
.keepform .row{ display:flex; gap:0.6rem; } .keepform .row > *{ flex:1; }
.keepform textarea{ min-height:4rem; resize:vertical; }
.keepform .actions{ display:flex; gap:0.6rem; margin-top:0.7rem; }
.note{ font-family:"Space Mono",monospace; font-size:0.62rem; color:var(--muted);
  padding:0.6rem 1.4rem; border-top:1px solid var(--line); }
</style>
</head>
<body class="studio">
<header class="studio-top">
  <a class="brand" href="/">the studio<small>the ruler &amp; the remainder · research workstation</small></a>
  <div class="links">
    <a href="/learn.html">learn ↗</a>
    <a href="/corpus">corpus ↗</a>
    <a href="/reality.html">reality check ↗</a>
  </div>
</header>
<main class="studio-grid">
  <section class="center" aria-label="Conversation">
    <div class="center-head">
      <input id="conv-title" type="text" value="untitled session" aria-label="Conversation title">
      <button class="btn" id="new-conv" type="button">new</button>
      <button class="btn verm" id="save-conv" type="button">save session</button>
    </div>
    <div class="thread" id="thread"></div>
    <div class="composer">
      <textarea id="say" rows="1" placeholder="bring a claim, a draft, a worry — argue it into shape…" aria-label="Your message"></textarea>
      <button class="btn verm" id="send" type="button">send</button>
    </div>
    <p class="note">propose-only · the dramaturg proposes; you keep. nothing is saved without your click. <span id="status"></span></p>
  </section>
  <aside class="rail" aria-label="Archive">
    <h2>kept artifacts</h2>
    <div id="artifacts"><p class="empty">nothing kept yet. argue something true, then keep it.</p></div>
    <h2>saved sessions</h2>
    <div id="conversations"><p class="empty">no saved sessions yet.</p></div>
  </aside>
</main>
<script src="/studio.js"></script>
</body>
</html>

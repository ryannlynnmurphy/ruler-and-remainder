<!doctype html>
<html lang="en">
<head>
<script>document.documentElement.className+=' js';</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Studio — the research workstation · The Ruler and the Remainder</title>
<meta name="description" content="The workroom. Argue research into shape with the dramaturg, run lab-instrument passes over your corpus, and keep what's worth keeping — a living archive you grow by arguing.">
<link rel="canonical" href="https://ruler-and-remainder.vercel.app/studio.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Ruler and the Remainder">
<meta property="og:title" content="The Studio — the research workstation">
<meta property="og:description" content="Argue research into shape, run lab passes over your corpus, keep what matters.">
<meta property="og:url" content="https://ruler-and-remainder.vercel.app/studio.html">
<meta property="og:image" content="https://ruler-and-remainder.vercel.app/og.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#e2300c">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
*{ box-sizing:border-box; }
:root{ --ink:#0e0d0a; --paper:#f4f0e6; --verm:#e2300c; --muted:#6c6557; --line:#cfc7b1; }
html,body{ height:100%; }
body.studio{ margin:0; background:var(--paper); color:var(--ink); font-family:"Newsreader",Georgia,serif; overflow:hidden; }

.app{ display:grid; grid-template-columns:250px 1fr 320px; height:100vh; }
.btn{ font-family:"Space Mono",monospace; font-size:0.7rem; letter-spacing:0.04em; text-transform:uppercase; border:1.5px solid var(--ink); background:var(--paper); color:var(--ink); padding:0.35rem 0.7rem; cursor:pointer; }
.btn:hover{ background:var(--ink); color:var(--paper); }
.btn.verm{ border-color:var(--verm); color:var(--verm); }
.btn.verm:hover{ background:var(--verm); color:var(--paper); }
.btn:disabled{ opacity:0.4; cursor:default; }

/* LEFT — sessions */
.side{ display:flex; flex-direction:column; border-right:2px solid var(--ink); min-height:0; background:#efe9da; }
.side .brand{ display:block; text-decoration:none; color:var(--ink); padding:1.1rem 1.2rem 0.7rem; border-bottom:1px solid var(--line); }
.side .brand b{ font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:1.1rem; letter-spacing:-0.01em; }
.side .brand small{ display:block; font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.05em; color:var(--muted); text-transform:uppercase; margin-top:0.15rem; }
.side .new{ margin:0.9rem 1rem 0.5rem; }
.side .titlewrap{ padding:0 1rem 0.5rem; }
.side .titlewrap input{ width:100%; font-family:"Space Grotesk",sans-serif; font-size:0.85rem; font-weight:600; border:1px solid var(--line); background:#fff; color:var(--ink); padding:0.35rem 0.5rem; }
.side .titlewrap input:focus{ outline:none; border-color:var(--verm); }
.sessions{ flex:1; overflow-y:auto; padding:0 0.7rem; min-height:0; }
.sessions .lh{ font-family:"Space Mono",monospace; font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); padding:0.4rem 0.3rem; }
.sidenav{ border-top:1px solid var(--line); padding:0.7rem 1.1rem; font-family:"Space Mono",monospace; font-size:0.66rem; letter-spacing:0.03em; }
.sidenav a{ color:var(--verm); text-decoration:none; margin-right:0.9rem; }

/* CENTER — conversation */
.center{ display:flex; flex-direction:column; min-width:0; min-height:0; }
.modebar{ display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; padding:0.55rem 1.4rem; border-bottom:1px solid var(--line); }
.modebar .lbl{ font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-right:0.3rem; }
.modechip{ font-family:"Space Mono",monospace; font-size:0.64rem; letter-spacing:0.02em; border:1px solid var(--line); background:var(--paper); color:var(--ink); padding:0.22rem 0.55rem; cursor:pointer; }
.modechip:hover{ border-color:var(--ink); }
.modechip.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.runbar{ display:none; align-items:center; gap:0.6rem; flex-wrap:wrap; padding:0.5rem 1.4rem; border-bottom:1px solid var(--line); background:#efe9da; }
.runbar.on{ display:flex; }
.runbar .msg{ font-family:"Space Mono",monospace; font-size:0.62rem; color:var(--muted); }
.runbar input{ font-family:"Newsreader",serif; font-size:0.85rem; border:1px solid var(--line); padding:0.25rem 0.45rem; background:#fff; color:var(--ink); }

.thread{ flex:1; overflow-y:auto; padding:1.6rem clamp(1.2rem,4vw,2.4rem); }
.msg{ margin:0 0 1.6rem; max-width:64ch; }
.msg .who{ font-family:"Space Mono",monospace; font-size:0.62rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:0.35rem; }
.msg.user .who{ color:var(--ink); } .msg.dram .who{ color:var(--verm); }
.msg .body{ white-space:pre-wrap; line-height:1.55; font-size:1.04rem; overflow-wrap:anywhere; }
.msg .body h4{ font-family:"Space Grotesk",sans-serif; font-size:0.76rem; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:var(--verm); margin:1rem 0 0.3rem; }
.msg .meta{ font-family:"Space Mono",monospace; font-size:0.62rem; color:var(--muted); margin-top:0.4rem; }
.msg .wsmeta{ font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.04em; text-transform:uppercase; color:var(--verm); margin-bottom:0.4rem; }
.msg .keep{ margin-top:0.5rem; }
.msg.pending .body{ color:var(--muted); font-style:italic; }
.tier{ display:inline-block; font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.04em; text-transform:uppercase; padding:0.05rem 0.4rem; border:1px solid; vertical-align:middle; }
.tier.established{ color:#2c6e49; border-color:#2c6e49; } .tier.exploratory{ color:#b06a00; border-color:#b06a00; } .tier.speculative{ color:var(--muted); border-color:var(--muted); }

.composer{ border-top:2px solid var(--ink); padding:0.8rem clamp(1.2rem,4vw,2.4rem); background:var(--paper); }
.composer .box{ display:flex; gap:0.6rem; align-items:flex-end; border:2px solid var(--ink); background:#fff; padding:0.45rem 0.45rem 0.45rem 0.8rem; }
.composer textarea{ flex:1; border:none; resize:none; font-family:"Newsreader",serif; font-size:1.02rem; line-height:1.45; background:transparent; color:var(--ink); min-height:1.6rem; max-height:9rem; padding:0.2rem 0; }
.composer textarea:focus{ outline:none; }
.note{ font-family:"Space Mono",monospace; font-size:0.6rem; color:var(--muted); margin:0.45rem 0 0; }

/* RIGHT — corpus + artifacts */
.rail{ overflow-y:auto; padding:1.1rem 1.1rem; background:#efe9da; border-left:1px solid var(--line); min-height:0; }
.railhead{ display:flex; align-items:center; gap:0.5rem; margin:1.2rem 0 0.5rem; }
.railhead:first-child{ margin-top:0; }
.railhead h2{ margin:0; font-family:"Space Mono",monospace; font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.railhead .mini{ margin-left:auto; font-family:"Space Mono",monospace; font-size:0.58rem; letter-spacing:0.04em; text-transform:uppercase; border:1px solid var(--ink); background:var(--paper); color:var(--ink); padding:0.15rem 0.45rem; cursor:pointer; }
.railhead .mini:hover{ background:var(--ink); color:var(--paper); }
.card{ background:var(--paper); border:1px solid var(--line); padding:0.55rem 0.7rem; margin-bottom:0.5rem; cursor:pointer; }
.card:hover{ border-color:var(--verm); }
.card.sel{ border-color:var(--verm); box-shadow:inset 3px 0 0 var(--verm); }
.card .t{ font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:0.84rem; line-height:1.2; overflow-wrap:anywhere; }
.card .s{ font-family:"Space Mono",monospace; font-size:0.58rem; letter-spacing:0.04em; text-transform:uppercase; color:var(--muted); margin-top:0.25rem; }
.card .auth{ display:inline-block; font-family:"Space Mono",monospace; font-size:0.54rem; letter-spacing:0.04em; text-transform:uppercase; padding:0.04rem 0.3rem; border:1px solid var(--muted); color:var(--muted); margin-right:0.3rem; }
.card .auth.ai{ color:var(--verm); border-color:var(--verm); } .card .auth.co{ color:#b06a00; border-color:#b06a00; }
.empty{ font-size:0.82rem; color:var(--muted); font-style:italic; }

/* keep-this form (propose-only) */
.keep{ font-family:"Space Mono",monospace; font-size:0.62rem; letter-spacing:0.03em; border:1px solid var(--line); background:var(--paper); color:var(--ink); padding:0.25rem 0.5rem; cursor:pointer; }
.keep:hover{ border-color:var(--verm); color:var(--verm); }
.keepform{ border:1.5px dashed var(--verm); padding:0.7rem; margin-top:0.5rem; background:#fff; max-width:62ch; }
.keepform label{ display:block; font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin:0.5rem 0 0.2rem; }
.keepform input, .keepform select, .keepform textarea{ width:100%; box-sizing:border-box; font-family:"Newsreader",serif; font-size:0.92rem; border:1px solid var(--line); padding:0.4rem 0.5rem; background:var(--paper); color:var(--ink); }
.keepform .row{ display:flex; gap:0.6rem; } .keepform .row > *{ flex:1; }
.keepform textarea{ min-height:4rem; resize:vertical; }
.keepform .actions{ display:flex; gap:0.6rem; margin-top:0.7rem; }

/* modal (add document / view item / reflection) */
.modal{ position:fixed; inset:0; background:rgba(14,13,10,0.55); display:none; align-items:flex-start; justify-content:center; padding:4vh 4vw; z-index:50; overflow:auto; }
.modal.open{ display:flex; }
.modal .sheet{ background:var(--paper); border:2px solid var(--ink); max-width:760px; width:100%; padding:1.6rem 1.8rem; box-shadow:8px 8px 0 rgba(14,13,10,0.18); overflow-wrap:anywhere; }
.modal .sheet h3{ font-family:"Space Grotesk",sans-serif; font-size:1.3rem; margin:0 0 0.2rem; }
.modal .x{ float:right; font-family:"Space Mono",monospace; font-size:0.8rem; border:none; background:none; cursor:pointer; color:var(--muted); }
.modal label{ display:block; font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin:0.7rem 0 0.2rem; }
.modal input, .modal select, .modal textarea{ width:100%; box-sizing:border-box; font-family:"Newsreader",serif; font-size:0.95rem; border:1px solid var(--line); padding:0.45rem 0.55rem; background:#fff; color:var(--ink); }
.modal .row{ display:flex; gap:0.6rem; } .modal .row > *{ flex:1; }
.modal textarea{ min-height:9rem; resize:vertical; }
.modal .docbody{ white-space:pre-wrap; line-height:1.5; font-size:0.95rem; max-height:46vh; overflow:auto; border:1px solid var(--line); padding:0.8rem; background:#fff; margin-top:0.5rem; }
.modal .report{ white-space:pre-wrap; line-height:1.6; font-size:0.98rem; }
.modal .chips span{ display:inline-block; font-family:"Space Mono",monospace; font-size:0.62rem; border:1px solid var(--line); padding:0.1rem 0.4rem; margin:0.15rem 0.2rem 0 0; }
.modal .claims li{ margin-bottom:0.3rem; }
.modal .actions{ display:flex; gap:0.6rem; margin-top:1rem; }

.menutoggle{ display:none; }
@media (max-width:980px){
  .app{ grid-template-columns:1fr; }
  .side, .rail{ position:fixed; top:0; bottom:0; z-index:40; width:78%; max-width:320px; transition:transform 0.2s ease; }
  .side{ left:0; transform:translateX(-105%); box-shadow:6px 0 24px rgba(14,13,10,0.2); }
  .side.open{ transform:translateX(0); }
  .rail{ right:0; left:auto; border-left:2px solid var(--ink); transform:translateX(105%); box-shadow:-6px 0 24px rgba(14,13,10,0.2); }
  .rail.open{ transform:translateX(0); }
  .menutoggle{ display:flex; gap:0.5rem; position:fixed; top:0.55rem; left:0.55rem; right:0.55rem; z-index:50; justify-content:space-between; pointer-events:none; }
  .menutoggle button{ pointer-events:auto; font-family:"Space Mono",monospace; font-size:0.66rem; border:1.5px solid var(--ink); background:var(--paper); padding:0.3rem 0.55rem; cursor:pointer; }
  .modebar{ padding-top:2.6rem; }
}
</style>
</head>
<body class="studio">
<div class="menutoggle">
  <button id="toggle-side" type="button">≡ sessions</button>
  <button id="toggle-rail" type="button">corpus ≡</button>
</div>
<div class="app">
  <aside class="side" id="side">
    <a class="brand" href="/"><b>the studio</b><small>the workroom</small></a>
    <button class="btn verm new" id="new-conv" type="button">+ new session</button>
    <div class="titlewrap"><input id="conv-title" type="text" value="untitled session" aria-label="Session title"></div>
    <button id="save-conv" type="button" style="display:none">save</button>
    <div class="sessions" id="sessions"><div class="lh">sessions</div><div id="conversations"></div></div>
    <nav class="sidenav"><a href="/lens">the lens</a><a href="/corpus">corpus</a><a href="/instruments.html">suite</a></nav>
  </aside>

  <section class="center" aria-label="Conversation">
    <div class="modebar" id="modebar">
      <span class="lbl">mode</span>
      <button class="modechip active" data-mode="argue" type="button">argue</button>
      <button class="modechip" data-mode="walkthrough" type="button">walkthrough</button>
      <button class="modechip" data-mode="synthesis" type="button">synthesis</button>
      <button class="modechip" data-mode="plan" type="button">plan</button>
      <button class="modechip" data-mode="critique" type="button">critique</button>
    </div>
    <div class="runbar" id="runbar">
      <span class="msg" id="runmsg">select documents from the corpus →</span>
      <input id="run-target" type="text" placeholder="e.g. research memo" style="display:none" aria-label="Deliverable type">
      <button class="btn verm" id="run-mode" type="button" style="margin-left:auto;">run</button>
    </div>
    <div class="thread" id="thread"></div>
    <div class="composer">
      <div class="box">
        <textarea id="say" rows="1" placeholder="bring a claim, a draft, a worry — argue it into shape…" aria-label="Your message"></textarea>
        <button class="btn verm" id="send" type="button">send</button>
      </div>
      <p class="note">propose-only · the dramaturg proposes; you keep. nothing saved without your click. <span id="status"></span></p>
    </div>
  </section>

  <aside class="rail" id="rail" aria-label="Archive">
    <div class="railhead">
      <h2>the corpus</h2>
      <button class="mini" id="reflect-btn" type="button" title="read the corpus as a whole">reflect</button>
      <button class="mini" id="add-doc" type="button">+ add</button>
    </div>
    <div id="corpus"><p class="empty">empty corpus. add a document — a source, a note, a draft.</p></div>
    <div class="railhead"><h2>kept artifacts</h2></div>
    <div id="artifacts"><p class="empty">nothing kept yet.</p></div>
  </aside>
</div>

<div class="modal" id="modal" aria-hidden="true"><div class="sheet" id="sheet"></div></div>
<script src="/studio.js"></script>
</body>
</html>

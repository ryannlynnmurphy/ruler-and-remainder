<!doctype html>
<html lang="en">
<head>
<script>document.documentElement.className+=' js';</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dorothy · Agentic Workstation · The Ruler and the Remainder</title>
<meta name="description" content="An agentic workstation for learning AI: walk the research, orchestrate inquiry with Dorothy, inspect sources and tiers in one command center.">
<link rel="canonical" href="https://ruler-and-remainder.vercel.app/dramaturg.html">
<meta property="og:site_name" content="The Ruler and the Remainder">
<meta property="og:title" content="Dorothy — Agentic Workstation">
<meta property="og:url" content="https://ruler-and-remainder.vercel.app/dramaturg.html">
<meta property="og:image" content="https://ruler-and-remainder.vercel.app/og.svg">
<meta name="theme-color" content="#0e0d0a">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body class="pandora agentic" data-layer="walk" data-run="idle">
<a class="skip" href="#chat-stage">Skip to chat</a>

<!-- CHAMBER 0: walk -->
<div id="walk-chamber" class="chamber-walk">
  <div class="game">
    <header class="gamebar">
      <div class="mascot" id="mascot" aria-hidden="true">
        <svg viewBox="0 0 64 74">
          <path d="M14 16 H50" stroke="#e2300c" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M14 16 Q3 41 14 64" stroke="#e2300c" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M50 16 Q61 41 50 64" stroke="#e2300c" stroke-width="4" fill="none" stroke-linecap="round"/>
          <line x1="14" y1="64" x2="50" y2="64" stroke="#e2300c" stroke-width="4" stroke-linecap="round"/>
          <circle class="eye" cx="32" cy="41" r="5.4" fill="#0e0d0a"/>
        </svg>
      </div>
      <div class="progress"><div id="pbar" class="pbar"></div></div>
      <span class="walk-label">chamber 0 · the walk</span>
    </header>
    <section id="stage" class="stage" aria-live="polite"></section>
    <footer class="gamefoot">
      <button id="back" class="gback" aria-label="back">←</button>
      <button id="cont" class="cont">open the box</button>
    </footer>
  </div>
</div>

<!-- AGENTIC WORKSTATION -->
<div id="workspace" class="ws-shell" hidden>
  <div id="ws-alert" class="ws-alert" hidden role="alert"></div>

  <!-- top command bar · 64px -->
  <header class="ws-topbar">
    <button class="ws-hamb" id="hamb" type="button" aria-label="sessions">☰</button>
    <a class="ws-brand" href="/dramaturg.html">
      <svg class="face" viewBox="0 0 64 74" aria-hidden="true">
        <path d="M14 16 H50" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M14 16 Q3 41 14 64" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M50 16 Q61 41 50 64" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <line x1="14" y1="64" x2="50" y2="64" stroke="#e2300c" stroke-width="5" stroke-linecap="round"/>
        <circle cx="32" cy="41" r="5.4" fill="#f4f0e6"/>
      </svg>
      <span><b>Dorothy</b><small>the dramaturg</small></span>
    </a>

    <div class="ws-spacer"></div>

    <nav class="ws-nav" aria-label="workstation">
      <button type="button" id="inspect-toggle" class="ws-navbtn" aria-pressed="false" title="show the sources behind the last answer">sources</button>
      <div class="ws-tools-wrap">
        <button type="button" id="toolsbtn" class="ws-navbtn" aria-expanded="false" title="tools Dorothy can use">tools</button>
        <div id="toolspanel" class="toolspanel" hidden></div>
      </div>
      <button type="button" id="localbtn" class="ws-navbtn localbtn" aria-pressed="false" hidden title="run a small model in your own browser">⚡ local</button>
      <a class="ws-navbtn" href="/corpus" title="the research corpus Dorothy reads from">corpus</a>
      <a class="ws-navbtn" href="/?walk=1" title="replay the walk">walk</a>
      <button type="button" id="global-stop" class="ws-stop" title="stop the current turn" hidden>stop</button>
    </nav>
  </header>

  <div class="ws-grid">
    <!-- left rail · 280px -->
    <aside class="ws-rail" id="side">
      <button class="ws-new" id="newbtn" type="button">＋ new mission</button>
      <div class="ws-rail-label">recent runs</div>
      <div class="ws-hist" id="hist"></div>
    </aside>
    <div class="ws-scrim" id="scrim"></div>

    <!-- center canvas -->
    <main class="ws-center" id="chat-stage">
      <header class="mission-header">
        <h1 id="mission-title" class="mission-title">new inquiry</h1>
        <div class="mission-meta">
          <span id="route-note" class="route-note"></span>
        </div>
      </header>

      <div class="screen final-screen pandora-chat-root">
        <div id="greet" class="greet" hidden></div>
        <div id="log" class="log ws-thread" role="log" aria-live="polite"></div>
        <div id="chips" class="chips"></div>
        <div id="attach" class="attach" hidden></div>
        <div class="sayrow ws-composer">
          <button id="clip" class="clip" type="button" aria-label="attach image">+ image</button>
          <textarea id="say" rows="2" aria-label="message" placeholder="ask for an outcome, not a command…"></textarea>
          <button id="send" class="run" aria-label="send">send</button>
          <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
        </div>
      </div>
    </main>

    <!-- right inspector · the sources the last answer stood on -->
    <aside class="ws-inspector" id="inspector">
      <div class="insp-head-row">
        <h2 class="insp-head">sources</h2>
        <button type="button" class="insp-close" id="insp-close" aria-label="close sources">×</button>
      </div>
      <div class="insp-body">
        <div id="inspector-evidence"></div>
        <ul id="source-list" class="source-list"></ul>
        <a class="panel-link" href="/corpus">open the archive ↗</a>
      </div>
    </aside>
  </div>

  <section class="pandora-corpus" id="corpus-chamber" data-unlock="corpus" hidden>
    <p class="corpus-kicker">↓ the research corpus</p>
    <a class="corpus-door" href="/corpus">read the full archive →</a>
    <p class="corpus-sub">books, pamphlets, essays — what Dorothy reads when she answers you.</p>
  </section>
</div>

<div id="unlock-toast" class="unlock-toast" role="status"></div>

<script src="/pandora.js"></script>
<script src="/workstation.js"></script>
<script>
(function(){
  var hist = document.getElementById("hist"), SKEY = "rr_sessions";
  function read(){ try { return JSON.parse(localStorage.getItem(SKEY)||"[]"); } catch(e){ return []; } }
  function ago(t){ var s=Math.max(0,(Date.now()-t)/1000); if(s<60)return"just now"; if(s<3600)return Math.floor(s/60)+"m"; if(s<86400)return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d"; }
  function tell(m){ window.dispatchEvent(new CustomEvent("rr-shell",{detail:m})); }
  function closeNav(){ document.body.classList.remove("nav-open"); }
  function render(){
    var ss=read(), nav=document.getElementById("side");
    if(nav) nav.classList.toggle("has-history", ss.length>0);
    if(!hist) return;
    if(!ss.length){ hist.innerHTML='<p class="hist-empty">runs appear here once you start.</p>'; return; }
    hist.innerHTML="";
    ss.forEach(function(s){
      var row=document.createElement("div"); row.className="hist-row";
      var b=document.createElement("button"); b.className="hist-it"; b.type="button";
      var done = s.messages && s.messages.some(function(m){ return m.role === 'user'; });
      b.innerHTML = '<b>' + (s.title || 'run') + '</b><time>' + ago(s.updatedAt || Date.now()) + '</time><span class="status-pill">' + (done ? 'complete' : 'draft') + '</span>';
      b.onclick=function(){ tell({type:"rr-load",id:s.id}); closeNav(); };
      var del=document.createElement("button"); del.className="hist-del"; del.type="button"; del.textContent="×";
      del.onclick=function(ev){ ev.stopPropagation(); tell({type:"rr-deleted",id:s.id}); };
      row.appendChild(b); row.appendChild(del); hist.appendChild(row);
    });
  }
  document.getElementById("newbtn")?.addEventListener("click",function(){ tell({type:"rr-new"}); closeNav(); });
  document.getElementById("hamb")?.addEventListener("click",function(){ document.body.classList.toggle("nav-open"); });
  document.getElementById("scrim")?.addEventListener("click", closeNav);
  window.addEventListener("rr-sessions", render);
  window.addEventListener("storage", function(e){ if(e.key===SKEY) render(); });
  window.addEventListener("focus", render);
  render();
  function setInspector(on){
    var shell=document.getElementById("workspace"); if(!shell) return;
    shell.classList.toggle("has-inspector", on);
    var tg=document.getElementById("inspect-toggle");
    if(tg) tg.setAttribute("aria-pressed", on ? "true" : "false");
  }
  document.getElementById("inspect-toggle")?.addEventListener("click", function(){
    setInspector(!document.getElementById("workspace").classList.contains("has-inspector"));
  });
  document.getElementById("insp-close")?.addEventListener("click", function(){ setInspector(false); });
})();
</script>
<script src="/learn.js"></script>
</body>
</html>

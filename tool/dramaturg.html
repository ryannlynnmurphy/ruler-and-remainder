<!doctype html>
<html lang="en">
<head>
<script>document.documentElement.className+=' js';</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Dramaturg — one workspace · The Ruler and the Remainder</title>
<meta name="description" content="One tool. Talk to the dramaturg, point it at the world (the Lens), or work the corpus (the Studio) — the same character, three ways to use it.">
<link rel="canonical" href="https://ruler-and-remainder.vercel.app/dramaturg.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Ruler and the Remainder">
<meta property="og:title" content="The Dramaturg — one workspace">
<meta property="og:description" content="One tool. Talk, read the world, or work the corpus — the same dramaturg, three ways to use it.">
<meta property="og:url" content="https://ruler-and-remainder.vercel.app/dramaturg.html">
<meta property="og:image" content="https://ruler-and-remainder.vercel.app/og.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0e0d0a">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{ --ink:#0e0d0a; --paper:#f4f0e6; --verm:#e2300c; --muted:#6c6557; --line:#cfc7b1; }
*{ box-sizing:border-box; }
html,body{ height:100%; }
body{ margin:0; background:var(--ink); color:var(--paper); font-family:"Space Grotesk",system-ui,sans-serif; overflow-x:hidden; }

.shell{ display:flex; flex-direction:column; height:100vh; }

/* below the workspace: the way to the full research corpus */
.below{ background:var(--paper); color:var(--ink); border-top:3px solid var(--verm); padding:clamp(2.4rem,7vw,4.5rem) 1.4rem; text-align:center; }
.below .eyebrow{ font-family:"Space Mono",monospace; font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin:0 0 0.7rem; }
.below a.read{ display:inline-block; text-decoration:none; color:var(--ink); font-family:Georgia,"Times New Roman",serif; font-weight:700; font-size:clamp(1.7rem,5vw,2.8rem); letter-spacing:-0.01em; line-height:1.05; border-bottom:3px solid var(--verm); padding-bottom:0.15rem; }
.below a.read:hover{ color:var(--verm); }
.below .sub{ margin:1.1rem auto 0; max-width:34rem; font-family:Georgia,serif; font-size:0.98rem; line-height:1.45; color:var(--muted); }

/* one bar: brand · modes · exits */
.bar{ display:flex; align-items:center; gap:1.2rem; padding:0 1rem; height:54px; background:var(--ink); border-bottom:1px solid #2a2823; flex:0 0 auto; }
.brand{ display:flex; align-items:center; gap:0.6rem; text-decoration:none; color:var(--paper); }
.brand .face{ width:26px; height:30px; display:block; }
.brand b{ font-weight:700; font-size:0.98rem; letter-spacing:-0.01em; }
.brand small{ font-family:"Space Mono",monospace; font-size:0.56rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-left:0.1rem; }

.modes{ display:flex; gap:0.3rem; }
.modes button{ appearance:none; background:none; border:1px solid transparent; color:#b7b0a0; font-family:"Space Grotesk",sans-serif; font-size:0.86rem; font-weight:600; letter-spacing:0.01em; padding:0.42rem 0.95rem; cursor:pointer; border-radius:2px; }
.modes button .k{ display:block; font-family:"Space Mono",monospace; font-size:0.5rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); font-weight:400; margin-top:0.06rem; }
.modes button:hover{ color:var(--paper); }
.modes button.on{ color:var(--ink); background:var(--verm); border-color:var(--verm); }
.modes button.on .k{ color:rgba(14,13,10,0.7); }

.exits{ margin-left:auto; display:flex; gap:1rem; font-family:"Space Mono",monospace; font-size:0.66rem; letter-spacing:0.04em; }
.exits a{ color:#b7b0a0; text-decoration:none; }
.exits a:hover{ color:var(--verm); }

/* the active surface — each mode is a kept, intact app in its own frame */
.stage{ flex:1 1 auto; position:relative; min-height:0; background:var(--paper); }
.stage iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; display:none; background:var(--paper); }
.stage iframe.on{ display:block; }

/* no-js / loading */
.boot{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-family:"Space Mono",monospace; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; }

@media (max-width:560px){
  .bar{ gap:0.7rem; padding:0 0.6rem; }
  .brand small{ display:none; }
  .modes button{ padding:0.38rem 0.6rem; font-size:0.8rem; }
  .modes button .k{ display:none; }
  .exits a:not(.corpus){ display:none; }
}
</style>
</head>
<body>
<div class="shell">
  <header class="bar">
    <a class="brand" href="/" title="the ruler and the remainder">
      <svg class="face" viewBox="0 0 64 74" aria-hidden="true">
        <path d="M14 16 H50" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M14 16 Q3 41 14 64" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M50 16 Q61 41 50 64" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <line x1="14" y1="64" x2="50" y2="64" stroke="#e2300c" stroke-width="5" stroke-linecap="round"/>
        <circle cx="32" cy="41" r="5.4" fill="#f4f0e6"/>
      </svg>
      <span><b>The Dramaturg</b><small>one workspace</small></span>
    </a>
    <nav class="modes" role="tablist" aria-label="workspace modes">
      <button data-mode="chat" role="tab" aria-selected="true">Chat<span class="k">talk it through</span></button>
      <button data-mode="lens" role="tab" aria-selected="false">Lens<span class="k">read the world</span></button>
      <button data-mode="studio" role="tab" aria-selected="false">Studio<span class="k">work the corpus</span></button>
    </nav>
    <div class="exits">
      <a class="corpus" href="/corpus">corpus ↗</a>
      <a href="/?walk=1">replay the walk ↗</a>
    </div>
  </header>
  <main class="stage" id="stage">
    <div class="boot" id="boot">opening the dramaturg…</div>
    <!-- each mode is its own intact app, hosted here -->
    <iframe id="f-chat"   title="Chat with the dramaturg" data-src="/learn.html?chat=1"></iframe>
    <iframe id="f-lens"   title="The Lens" data-src="/lens.html"></iframe>
    <iframe id="f-studio" title="The Studio" data-src="/studio.html"></iframe>
  </main>
</div>
<footer class="below">
  <p class="eyebrow">↓ below the workspace</p>
  <a class="read" href="/corpus">read the full research corpus →</a>
  <p class="sub">every book, pamphlet, essay, and dialogue — the writing the dramaturg stands on.</p>
</footer>
<script>
(function(){
  var MODES = ["chat","lens","studio"];
  var btns = {}, frames = {};
  document.querySelectorAll(".modes button").forEach(function(b){ btns[b.dataset.mode] = b; });
  MODES.forEach(function(m){ frames[m] = document.getElementById("f-"+m); });
  var boot = document.getElementById("boot");

  function show(mode){
    if (MODES.indexOf(mode) < 0) mode = "chat";
    // lazy-load each app the first time its tab is opened — keeps the shell light
    var f = frames[mode];
    if (!f.src) { f.src = f.dataset.src; }
    MODES.forEach(function(m){
      var on = m === mode;
      frames[m].classList.toggle("on", on);
      btns[m].classList.toggle("on", on);
      btns[m].setAttribute("aria-selected", on ? "true" : "false");
    });
    if (boot) { boot.style.display = "none"; }
    try { localStorage.setItem("rr_dramaturg_mode", mode); } catch(e){}
    if (location.hash.slice(1) !== mode) history.replaceState(null, "", "#" + mode);
  }

  MODES.forEach(function(m){ btns[m].addEventListener("click", function(){ show(m); }); });
  window.addEventListener("hashchange", function(){ show(location.hash.slice(1)); });

  // open to: explicit hash → last used → chat
  var start = location.hash.slice(1);
  if (MODES.indexOf(start) < 0) { try { start = localStorage.getItem("rr_dramaturg_mode") || "chat"; } catch(e){ start = "chat"; } }
  show(start);
})();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<script>document.documentElement.className+=' js';</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dorothy · The Ruler and the Remainder</title>
<meta name="description" content="One interface: talk to the dramaturg. It reads the world through the corpus, argues a claim into shape, and hands it back tiered. Your conversations are kept; the whole research corpus sits one link below.">
<link rel="canonical" href="https://ruler-and-remainder.vercel.app/dramaturg.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Ruler and the Remainder">
<meta property="og:title" content="Dorothy — the dramaturg">
<meta property="og:description" content="One interface — talk to Dorothy. A live answer engine with a conscience.">
<meta property="og:url" content="https://ruler-and-remainder.vercel.app/dramaturg.html">
<meta property="og:image" content="https://ruler-and-remainder.vercel.app/og.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0e0d0a">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{ --ink:#0e0d0a; --paper:#f4f0e6; --verm:#e2300c; --muted:#6c6557; --line:#cfc7b1; --side:#16150f; --sideln:#2a2823; }
*{ box-sizing:border-box; }
html,body{ height:100%; }
body{ margin:0; background:var(--ink); color:var(--paper); font-family:"Space Grotesk",system-ui,sans-serif; overflow-x:hidden; }

.shell{ display:flex; flex-direction:column; height:100vh; }

/* slim top bar */
.bar{ display:flex; align-items:center; gap:0.9rem; padding:0 1rem; height:52px; background:var(--ink); border-bottom:1px solid var(--sideln); flex:0 0 auto; z-index:5; }
.hamb{ display:none; appearance:none; background:none; border:0; color:var(--paper); font-size:1.1rem; cursor:pointer; padding:0.2rem 0.3rem; line-height:1; }
.brand{ display:flex; align-items:center; gap:0.6rem; text-decoration:none; color:var(--paper); }
.brand .face{ width:24px; height:28px; display:block; }
.brand span{ display:flex; flex-direction:column; line-height:1.05; }
.brand b{ font-weight:700; font-size:0.96rem; letter-spacing:-0.01em; }
.brand small{ font-family:"Space Mono",monospace; font-size:0.5rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); margin-top:3px; }
.exits{ margin-left:auto; display:flex; gap:1rem; font-family:"Space Mono",monospace; font-size:0.66rem; letter-spacing:0.04em; }
.exits a{ color:#b7b0a0; text-decoration:none; }
.exits a:hover{ color:var(--verm); }

/* the workstation: history rail | the conversation */
.work{ flex:1 1 auto; display:flex; min-height:0; }
.side{ width:264px; flex:0 0 auto; background:var(--side); border-right:1px solid var(--sideln); display:flex; flex-direction:column; min-height:0; }
.newbtn{ margin:0.9rem 0.9rem 0.5rem; font-family:"Space Mono",monospace; font-size:0.72rem; letter-spacing:0.05em; text-transform:lowercase; color:var(--paper); background:var(--verm); border:1px solid var(--verm); padding:0.6rem 0.8rem; cursor:pointer; text-align:left; }
.newbtn:hover{ background:#c52908; border-color:#c52908; }
.side .lh{ font-family:"Space Mono",monospace; font-size:0.56rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); padding:0.7rem 1.1rem 0.3rem; }
.hist{ flex:1 1 auto; overflow-y:auto; min-height:0; padding:0 0.5rem 1rem; }
.hist .it{ display:block; width:100%; text-align:left; border:0; background:none; cursor:pointer; padding:0.55rem 0.6rem; color:#cfc8b8; border-radius:3px; border-left:2px solid transparent; }
.hist .it:hover{ background:#201e16; color:var(--paper); }
.hist .it-row{ display:flex; align-items:stretch; border-radius:3px; }
.hist .it-row:hover{ background:#201e16; }
.hist .it-row .it{ flex:1 1 auto; min-width:0; }
.hist .it-row:hover .it{ background:none; }
.it-del{ flex:0 0 auto; appearance:none; background:none; border:0; color:var(--muted); cursor:pointer; padding:0 0.6rem; font-size:1.05rem; line-height:1; opacity:0; transition:opacity 0.12s, color 0.12s; }
.it-row:hover .it-del{ opacity:1; }
.it-del:hover{ color:var(--verm); }
.hist .it b{ display:block; font-weight:500; font-size:0.84rem; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hist .it time{ font-family:"Space Mono",monospace; font-size:0.56rem; letter-spacing:0.04em; color:var(--muted); }
.hist .empty{ font-family:"Space Mono",monospace; font-size:0.64rem; color:var(--muted); padding:0.6rem; line-height:1.5; }

.stage{ flex:1 1 auto; position:relative; min-height:0; background:var(--paper); }
.stage iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; background:var(--paper); }

.scrim{ display:none; }

/* below: the corpus it stands on */
.below{ background:var(--paper); color:var(--ink); border-top:3px solid var(--verm); padding:clamp(2.4rem,7vw,4.5rem) 1.4rem; text-align:center; }
.below .eyebrow{ font-family:"Space Mono",monospace; font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin:0 0 0.7rem; }
.below a.read{ display:inline-block; text-decoration:none; color:var(--ink); font-family:Georgia,"Times New Roman",serif; font-weight:700; font-size:clamp(1.7rem,5vw,2.8rem); letter-spacing:-0.01em; line-height:1.05; border-bottom:3px solid var(--verm); padding-bottom:0.15rem; }
.below a.read:hover{ color:var(--verm); }
.below .sub{ margin:1.1rem auto 0; max-width:34rem; font-family:Georgia,serif; font-size:0.98rem; line-height:1.45; color:var(--muted); }

@media (max-width:720px){
  .hamb{ display:block; }
  .brand small{ display:none; }
  .side{ position:fixed; top:52px; left:0; bottom:0; z-index:20; transform:translateX(-100%); transition:transform 0.22s cubic-bezier(.2,.7,.2,1); width:80vw; max-width:300px; }
  body.nav-open .side{ transform:none; }
  body.nav-open .scrim{ display:block; position:fixed; inset:52px 0 0 0; background:rgba(14,13,10,0.5); z-index:15; }
}
</style>
</head>
<body>
<div class="shell">
  <header class="bar">
    <button class="hamb" id="hamb" aria-label="conversations">☰</button>
    <a class="brand" href="/" title="the ruler and the remainder">
      <svg class="face" viewBox="0 0 64 74" aria-hidden="true">
        <path d="M14 16 H50" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M14 16 Q3 41 14 64" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M50 16 Q61 41 50 64" stroke="#e2300c" stroke-width="5" fill="none" stroke-linecap="round"/>
        <line x1="14" y1="64" x2="50" y2="64" stroke="#e2300c" stroke-width="5" stroke-linecap="round"/>
        <circle cx="32" cy="41" r="5.4" fill="#f4f0e6"/>
      </svg>
      <span><b>Dorothy</b><small>the dramaturg</small></span>
    </a>
    <div class="exits">
      <a class="corpus" href="/corpus">corpus ↗</a>
      <a href="/?walk=1">replay the walk ↗</a>
    </div>
  </header>
  <div class="work">
    <aside class="side" id="side">
      <button class="newbtn" id="newbtn" type="button">＋ new conversation</button>
      <div class="lh">recent</div>
      <div class="hist" id="hist"></div>
    </aside>
    <main class="stage">
      <iframe id="chat" src="/learn.html?chat=1" title="Talk to the dramaturg"></iframe>
    </main>
  </div>
  <div class="scrim" id="scrim"></div>
</div>
<footer class="below">
  <p class="eyebrow">↓ the corpus it stands on</p>
  <a class="read" href="/corpus">read the full research corpus →</a>
  <p class="sub">every book, pamphlet, essay, and dialogue — the writing the dramaturg reads from when it answers you.</p>
</footer>
<script>
(function(){
  var frame = document.getElementById("chat");
  var hist = document.getElementById("hist");
  var SKEY = "rr_sessions";
  function read(){ try { return JSON.parse(localStorage.getItem(SKEY) || "[]"); } catch(e){ return []; } }
  function write(a){ try { localStorage.setItem(SKEY, JSON.stringify(a)); } catch(e){} }
  function remove(id){ write(read().filter(function(s){ return s.id !== id; })); tell({ type: "rr-deleted", id: id }); render(); }
  function ago(t){
    var s = Math.max(0, (Date.now() - t) / 1000);
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s/60) + "m ago";
    if (s < 86400) return Math.floor(s/3600) + "h ago";
    return Math.floor(s/86400) + "d ago";
  }
  function tell(msg){ try { frame.contentWindow.postMessage(msg, "*"); } catch(e){} }
  function closeNav(){ document.body.classList.remove("nav-open"); }
  function render(){
    var ss = read();
    if (!ss.length){ hist.innerHTML = '<p class="empty">your conversations show up here once you start talking.</p>'; return; }
    hist.innerHTML = "";
    ss.forEach(function(s){
      var row = document.createElement("div"); row.className = "it-row";
      var b = document.createElement("button");
      b.className = "it"; b.type = "button";
      var t = document.createElement("b"); t.textContent = s.title || "conversation";
      var w = document.createElement("time"); w.textContent = ago(s.updatedAt || Date.now());
      b.appendChild(t); b.appendChild(w);
      b.addEventListener("click", function(){ tell({ type: "rr-load", id: s.id }); closeNav(); });
      var del = document.createElement("button");
      del.className = "it-del"; del.type = "button"; del.textContent = "×";
      del.setAttribute("aria-label", "delete conversation"); del.title = "delete";
      del.addEventListener("click", function(ev){ ev.stopPropagation(); remove(s.id); });
      row.appendChild(b); row.appendChild(del);
      hist.appendChild(row);
    });
  }
  document.getElementById("newbtn").addEventListener("click", function(){ tell({ type: "rr-new" }); closeNav(); });
  document.getElementById("hamb").addEventListener("click", function(){ document.body.classList.toggle("nav-open"); });
  document.getElementById("scrim").addEventListener("click", closeNav);
  window.addEventListener("message", function(e){ if (e.data && e.data.type === "rr-sessions") render(); });
  window.addEventListener("storage", function(e){ if (e.key === SKEY) render(); });
  window.addEventListener("focus", render);
  render();
})();
</script>
</body>
</html>

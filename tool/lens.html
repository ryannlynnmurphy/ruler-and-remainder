<!doctype html>
<html lang="en">
<head>
<script>document.documentElement.className+=' js';</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Lens — read the world through your research · The Ruler and the Remainder</title>
<meta name="description" content="A research instrument. Bring anything from the world and read it through your own corpus — what it says, what it hides, and what your work says about it. Cited, tiered, spoken aloud, and saved.">
<link rel="canonical" href="https://ruler-and-remainder.vercel.app/lens.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Ruler and the Remainder">
<meta property="og:title" content="The Lens">
<meta property="og:description" content="Read the world through your own research. The media-literacy machine, powered by your corpus.">
<meta property="og:url" content="https://ruler-and-remainder.vercel.app/lens.html">
<meta property="og:image" content="https://ruler-and-remainder.vercel.app/og.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#e2300c">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
*{ box-sizing:border-box; }
:root{ --ink:#0e0d0a; --paper:#f4f0e6; --verm:#e2300c; --muted:#6c6557; --line:#cfc7b1; }
html,body{ height:100%; }
body.lens{ margin:0; background:var(--paper); color:var(--ink); font-family:"Newsreader",Georgia,serif; overflow:hidden; }

.app{ display:grid; grid-template-columns:280px 1fr; height:100vh; }
/* sidebar */
.side{ display:flex; flex-direction:column; border-right:2px solid var(--ink); min-height:0; background:#efe9da; }
.side .brand{ display:block; text-decoration:none; color:var(--ink); padding:1.1rem 1.2rem 0.8rem; border-bottom:1px solid var(--line); }
.side .brand b{ font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:1.1rem; letter-spacing:-0.01em; }
.side .brand small{ display:block; font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.05em; color:var(--muted); text-transform:uppercase; margin-top:0.15rem; }
.side .new{ margin:0.9rem 1rem; font-family:"Space Mono",monospace; font-size:0.72rem; letter-spacing:0.04em; text-transform:uppercase; border:1.5px solid var(--verm); background:var(--verm); color:var(--paper); padding:0.55rem; cursor:pointer; }
.side .new:hover{ background:var(--ink); border-color:var(--ink); }
.log{ flex:1; overflow-y:auto; padding:0 0.7rem; min-height:0; }
.log .lh{ font-family:"Space Mono",monospace; font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); padding:0.4rem 0.3rem; }
.log .item{ display:block; width:100%; text-align:left; border:none; background:none; cursor:pointer; padding:0.5rem 0.4rem; font-family:"Newsreader",serif; font-size:0.92rem; line-height:1.25; color:var(--ink); border-radius:0; border-left:2px solid transparent; }
.log .item:hover{ background:var(--paper); }
.log .item.on{ border-left-color:var(--verm); background:var(--paper); }
.log .item small{ display:block; font-family:"Space Mono",monospace; font-size:0.56rem; color:var(--muted); margin-top:0.1rem; }
.log .empty{ font-family:"Space Mono",monospace; font-size:0.62rem; color:var(--muted); padding:0.5rem 0.4rem; }
.sidenav{ border-top:1px solid var(--line); padding:0.7rem 1.1rem; font-family:"Space Mono",monospace; font-size:0.66rem; letter-spacing:0.03em; }
.sidenav a{ color:var(--verm); text-decoration:none; margin-right:0.9rem; }

/* main */
.main{ display:flex; flex-direction:column; min-width:0; min-height:0; }
.thread{ flex:1; overflow-y:auto; padding:2rem clamp(1.2rem,5vw,3rem); }
.inner{ max-width:760px; margin:0 auto; }
.empty-state{ max-width:600px; margin:6vh auto 0; }
.empty-state h1{ font-family:"Space Grotesk",sans-serif; font-size:clamp(1.9rem,4.5vw,2.7rem); font-weight:700; line-height:1.05; letter-spacing:-0.02em; margin:0 0 0.5rem; }
.empty-state h1 .v{ color:var(--verm); }
.empty-state p{ font-size:1.05rem; line-height:1.5; color:var(--muted); margin:0 0 1.6rem; }
.chips{ display:flex; flex-wrap:wrap; gap:0.5rem; }
.chip{ font-family:"Space Mono",monospace; font-size:0.66rem; border:1px solid var(--line); background:#fff; color:var(--ink); padding:0.35rem 0.6rem; cursor:pointer; text-align:left; }
.chip:hover{ border-color:var(--verm); color:var(--verm); }

.turn{ max-width:760px; margin:0 auto 2rem; }
.turn.user .bubble{ font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:1.05rem; line-height:1.35; background:#fff; border:1px solid var(--line); border-left:3px solid var(--ink); padding:0.8rem 1rem; }
.turn .who{ font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:0.4rem; }
.turn.read .who{ color:var(--verm); }
.reading{ font-size:1.06rem; }
.reading h4{ font-family:"Space Grotesk",sans-serif; font-size:0.76rem; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--verm); margin:1.5rem 0 0.5rem; }
.reading p{ line-height:1.6; margin:0 0 0.9rem; }
.tier{ display:inline-block; font-family:"Space Mono",monospace; font-size:0.6rem; letter-spacing:0.04em; text-transform:uppercase; padding:0.05rem 0.4rem; border:1px solid; vertical-align:middle; }
.tier.established{ color:#2c6e49; border-color:#2c6e49; } .tier.exploratory{ color:#b06a00; border-color:#b06a00; } .tier.speculative{ color:var(--muted); border-color:var(--muted); }
.cite{ color:var(--verm); font-style:italic; }
.srcline{ font-family:"Space Mono",monospace; font-size:0.62rem; letter-spacing:0.02em; color:var(--muted); margin-top:0.3rem; }
.srcline b{ color:var(--ink); }
.acts{ display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.9rem; }
.act{ font-family:"Space Mono",monospace; font-size:0.64rem; letter-spacing:0.03em; border:1px solid var(--line); background:var(--paper); color:var(--ink); padding:0.3rem 0.6rem; cursor:pointer; }
.act:hover{ border-color:var(--verm); color:var(--verm); }
.act:disabled{ opacity:0.5; cursor:default; }
.thinking{ font-family:"Space Mono",monospace; font-size:0.82rem; color:var(--muted); font-style:italic; }
.err{ color:var(--verm); font-family:"Space Mono",monospace; font-size:0.82rem; }

.composer{ border-top:2px solid var(--ink); padding:0.9rem clamp(1.2rem,5vw,3rem); background:var(--paper); }
.composer .box{ max-width:760px; margin:0 auto; display:flex; gap:0.7rem; align-items:flex-end; border:2px solid var(--ink); background:#fff; padding:0.5rem 0.5rem 0.5rem 0.8rem; }
.composer textarea{ flex:1; border:none; resize:none; font-family:"Newsreader",serif; font-size:1.05rem; line-height:1.45; background:transparent; color:var(--ink); min-height:1.6rem; max-height:9rem; padding:0.2rem 0; }
.composer textarea:focus{ outline:none; }
.composer .send{ font-family:"Space Mono",monospace; font-size:0.72rem; letter-spacing:0.05em; text-transform:uppercase; border:1.5px solid var(--verm); background:var(--verm); color:var(--paper); padding:0.5rem 0.9rem; cursor:pointer; }
.composer .send:hover{ background:var(--ink); border-color:var(--ink); } .composer .send:disabled{ opacity:0.5; cursor:default; }
.composer .hint{ max-width:760px; margin:0.4rem auto 0; font-family:"Space Mono",monospace; font-size:0.58rem; letter-spacing:0.03em; color:var(--muted); }

.menutoggle{ display:none; }
@media (max-width:820px){
  .app{ grid-template-columns:1fr; }
  .side{ position:fixed; inset:0 30% 0 0; z-index:40; transform:translateX(-105%); transition:transform 0.2s ease; box-shadow:6px 0 24px rgba(14,13,10,0.2); }
  .side.open{ transform:translateX(0); }
  .menutoggle{ display:inline-block; position:fixed; top:0.6rem; left:0.6rem; z-index:50; font-family:"Space Mono",monospace; font-size:0.7rem; border:1.5px solid var(--ink); background:var(--paper); padding:0.35rem 0.6rem; cursor:pointer; }
  .thread{ padding-top:3rem; }
}
</style>
</head>
<body class="lens">
<button class="menutoggle" id="menutoggle" type="button" aria-label="Toggle readings">≡ readings</button>
<div class="app">
  <aside class="side" id="side">
    <a class="brand" href="/"><b>the lens</b><small>read the world through your research</small></a>
    <button class="new" id="new" type="button">+ new reading</button>
    <div class="log" id="log"><div class="lh">readings</div></div>
    <nav class="sidenav">
      <a href="/studio">studio</a><a href="/corpus">corpus</a><a href="/instruments.html">suite</a>
    </nav>
  </aside>
  <main class="main">
    <div class="thread" id="thread"></div>
    <div class="composer">
      <div class="box">
        <textarea id="text" rows="1" placeholder="bring anything — a headline, a claim, a paragraph — or ask a follow-up…" aria-label="Message"></textarea>
        <button class="send" id="go" type="button">read</button>
      </div>
      <p class="hint">grounded in your corpus · cited · tiered · ⌘↵ to send</p>
    </div>
  </main>
</div>
<script src="/lens.js"></script>
</body>
</html>
